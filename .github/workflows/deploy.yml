name: Deploy

# auto-deploy เมื่อ push เข้า main (เฉพาะไฟล์ที่ deploy จริง) หรือสั่งเองจากแท็บ Actions
on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'deploy/**'
      - 'VERSION'
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy → aquachord.online
    runs-on: ubuntu-latest
    steps:
      - name: เช็คว่ามี secret ครบไหม
        id: chk
        env:
          KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          if [ -z "$KEY" ]; then
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=ข้ามการ deploy::ยังไม่ได้ตั้ง secret DEPLOY_SSH_KEY / DEPLOY_HOST / DEPLOY_USER — เพิ่มใน Settings → Secrets and variables → Actions แล้วจะ auto-deploy อัตโนมัติ"
          else
            echo "ok=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy ผ่าน SSH (รัน deploy.sh บนเซิร์ฟเวอร์)
        if: steps.chk.outputs.ok == 'true'
        env:
          KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          HOST: ${{ secrets.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USER }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=accept-new "$USER@$HOST" \
            'cd /home/admin/domains/aquachord.online/_src && bash deploy/deploy.sh main'

<!doctype html>
<html lang="th" data-lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b7d75" />
  <meta name="robots" content="noindex, nofollow" />
  <title>AquaChord · หลังบ้าน</title>
  <link rel="icon" href="../assets/logo-mark.png" type="image/png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Mitr:wght@400;500;600;700&family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="admin.css" />
  <script>
    (function () {
      var t = localStorage.getItem('aq.theme');
      if (!t) t = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', t);
      var m = document.querySelector('meta[name="theme-color"]');
      if (m) m.setAttribute('content', t === 'dark' ? '#0a1622' : '#0b7d75');
    })();
  </script>
</head>
<body>
  <canvas id="bubbles" aria-hidden="true"></canvas>
  <div id="app"></div>
  <div id="modalRoot"></div>
  <div id="toastRoot" class="toast-root" aria-live="polite"></div>
  <script src="admin.js"></script>
</body>
</html>

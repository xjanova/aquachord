<!doctype html>
<html lang="th" data-lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0d9488" />
  <title>AquaChord — แกะคอร์ดเพลงด้วย AI</title>
  <meta name="description" content="AquaChord — แกะคอร์ดกีตาร์ แท็บ และเนื้อเพลงจากลิงก์วิดีโอหรือไฟล์เสียงด้วย AI ฟังเสียงโน้ตได้ แก้ไขได้ ติดตั้งบนมือถือได้" />

  <link rel="icon" href="assets/logo-mark.png" type="image/png" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <link rel="manifest" href="manifest.webmanifest" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Mitr:wght@400;500;600;700&family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="assets/styles.css" />
  <script>
    /* ตั้งธีมก่อน paint กันจอกระพริบ */
    (function () {
      var t = localStorage.getItem('aq.theme');
      if (!t) t = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', t);
      var m = document.querySelector('meta[name="theme-color"]');
      if (m) m.setAttribute('content', t === 'dark' ? '#0a1622' : '#0d9488');
    })();
  </script>
</head>
<body>
  <!-- ฟองอากาศลอย (canvas) -->
  <canvas id="bubbles" aria-hidden="true"></canvas>
  <div class="caustics" aria-hidden="true"></div>

  <!-- มาสคอต: ยืนขวาจอเสมอ อยู่หลัง content แต่เหนือฟองน้ำ -->
  <img class="mascot" aria-hidden="true" alt="" decoding="async"
       src="assets/mascot.webp"
       srcset="assets/mascot-sm.webp 496w, assets/mascot.webp 880w"
       sizes="(max-width: 760px) 62vw, 42vw" />

  <!-- โครงแอป -->
  <header class="topbar glass">
    <a class="brand" href="#/" aria-label="AquaChord home">
      <img class="brand-logo" src="assets/logo-mark.png" alt="AquaChord" width="38" height="38" />
      <span class="brand-name">Aqua<span class="brand-name-accent">Chord</span></span>
    </a>
    <div class="topbar-actions">
      <button id="themeToggle" class="theme-toggle" type="button" aria-label="Toggle dark mode">
        <span class="ic-moon">🌙</span><span class="ic-sun">☀️</span>
      </button>
      <button id="langToggle" class="lang-toggle" type="button" aria-label="Switch language">
        <span class="lang-th">ไทย</span><span class="lang-sep">/</span><span class="lang-en">EN</span>
      </button>
      <button id="installBtn" class="btn-ghost install-btn" type="button" hidden data-i18n="install">ติดตั้งแอป</button>
    </div>
  </header>

  <main id="view" class="view"><!-- แต่ละหน้า render ที่นี่ --></main>

  <!-- แถบเมนูล่าง (มือถือ) / ข้าง (จอใหญ่) -->
  <nav class="tabbar glass" role="navigation">
    <a class="tab" href="#/" data-route="home">
      <svg viewBox="0 0 24 24" class="tab-ic"><path d="M12 3l8 7h-2v9h-5v-6h-2v6H6v-9H4z"/></svg>
      <span data-i18n="nav.home">แกะเพลง</span>
    </a>
    <a class="tab" href="#/library" data-route="library">
      <svg viewBox="0 0 24 24" class="tab-ic"><path d="M4 5h11v2H4zm0 4h11v2H4zm0 4h7v2H4zm13-8l4 3-4 3z"/></svg>
      <span data-i18n="nav.library">คลังเพลง</span>
    </a>
    <a class="tab" href="#/settings" data-route="settings">
      <svg viewBox="0 0 24 24" class="tab-ic"><path d="M12 8a4 4 0 100 8 4 4 0 000-8zm8.9 4l1.7 1.3-1.7 3-2-.6a7 7 0 01-1.4.8l-.3 2.1H10l-.3-2.1a7 7 0 01-1.4-.8l-2 .6-1.7-3L6.3 12l-1.7-1.3 1.7-3 2 .6a7 7 0 011.4-.8L10 3.4h4l.3 2.1c.5.2 1 .5 1.4.8l2-.6 1.7 3z"/></svg>
      <span data-i18n="nav.settings">ตั้งค่า</span>
    </a>
  </nav>

  <!-- Modal root -->
  <div id="modalRoot"></div>
  <div id="toastRoot" class="toast-root" aria-live="polite"></div>

  <script src="assets/js/i18n.js"></script>
  <script src="assets/js/music.js"></script>
  <script src="assets/js/chordpro.js"></script>
  <script src="assets/js/store.js"></script>
  <script src="assets/js/demo.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
